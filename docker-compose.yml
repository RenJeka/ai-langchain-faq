services:
  chroma:
    image: chromadb/chroma:0.5.23
    ports:
      - "8000:8000"
    volumes:
      - ./.chroma:/chroma/chroma
    restart: unless-stopped

  docling-serve:
    image: quay.io/docling-project/docling-serve:latest
    ports:
      # Хост-порт 5002, бо 5001 на macOS часто зайнятий (AirDrop/AirDroid/ControlCenter).
      - "5002:5001"
    environment:
      # Синхронна конвертація PDF на CPU триває ~140с; дефолтні 120с дають 504.
      # Піднімаємо ліміт очікування sync-ендпоінта, щоб клієнт дочекався результату.
      - DOCLING_SERVE_MAX_SYNC_WAIT=600
    restart: unless-stopped
